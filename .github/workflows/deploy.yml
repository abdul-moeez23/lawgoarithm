name: Deploy Django App via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            echo "Connected to server! Starting deployment..."
            cd ~/lawgoarithm
            
            # Pull latest changes from the branch that triggered the workflow
            git pull origin ${{ github.ref_name }}
            
            # Rebuild and restart the Docker containers in background
            docker compose down
            docker compose up -d --build
            
            # Run migrations and collect static files inside the container
            docker compose exec -T web python manage.py migrate --noinput
            docker compose exec -T web python manage.py collectstatic --noinput
            
            echo "Deployment finished successfully!"

