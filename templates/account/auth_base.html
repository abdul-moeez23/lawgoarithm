{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - Lawgorithm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-navy: #0f172a;
            --accent-gold: #c9a961;
            --white: #ffffff;
            --border-color: #e2e8f0;
            --text-gray: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--white); min-height: 100vh; display: flex; }

        .auth-container { display: flex; width: 100%; min-height: 100vh; }

        .brand-section {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-navy) 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            position: relative;
            overflow: hidden;
            display: none;
        }

        @media (min-width: 1024px) { .brand-section { display: flex; width: 50%; } }

        .brand-content { z-index: 2; color: var(--white); max-width: 500px; text-align: center; }
        .brand-logo { font-family: 'Poppins', sans-serif; font-size: 3.5rem; font-weight: 800; background: linear-gradient(135deg, var(--accent-gold), #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.5rem; letter-spacing: -1px; }
        .brand-tagline { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; color: #e2e8f0; }
        .brand-desc { font-size: 1.1rem; color: #94a3b8; line-height: 1.6; }

        .form-section { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; background-color: #f8fafc; }
        .form-container { width: 100%; max-width: 550px; background: var(--white); padding: 3rem; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }

        /* Abstract Visual Elements */
        .circle-1 { position: absolute; top: -100px; right: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,97,0.1) 0%, rgba(255,255,255,0) 70%); z-index: 1; }
        .circle-2 { position: absolute; bottom: -50px; left: -50px; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(201,169,97,0.05) 0%, rgba(255,255,255,0) 70%); z-index: 1; }

        @media (max-width: 640px) { .form-container { padding: 2rem 1.5rem; } }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="auth-container">
        <div class="brand-section">
            <div class="circle-1"></div>
            <div class="circle-2"></div>
            <div class="brand-content">
                <div class="brand-logo">Lawgorithm</div>
                <h2 class="brand-tagline">Excellence in Legal Representation</h2>
                <p class="brand-desc">Join our premier platform connecting elite legal professionals with clients seeking justice and expert counsel.</p>
            </div>
        </div>
        <div class="form-section">
            <div class="form-container">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
</body>
</html>
